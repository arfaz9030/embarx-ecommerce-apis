spring.application.name=sb-ecom
server.port=1005

# Enable the H2 database web console
# Spring Boot will start the H2 console at /h2-console by default.
# This is useful during development to visually inspect the in-memory database.
# Interview line:
# "spring.h2.console.enabled=true enables the interactive H2 web UI
#  so developers can view and query tables at runtime."

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Configure the JDBC URL for the H2 database
# 'jdbc:h2:mem:test' creates an in-memory H2 database named 'test'.
# Because it's in-memory, data will not persist across application restarts.
# Interview line:
# "spring.datasource.url=jdbc:h2:mem:test sets up an in-memory H2 database,
#  often used for quick development/testing without an external database."

spring.datasource.url=jdbc:h2:mem:test
